name: Sample environment variables
on: push
env:
  ENV1: Course
  ENV2: Subject
  PASSWORD: 123e

jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Print environment variables
          run: |
            echo "ENV1: $ENV1"
            echo "ENV2: $ENV2"
            echo "PASSWORD: $PASSWORD"
            echo "USERNAME: ${{ secrets.USER_NAME }}"
            echo "PASSWORD: ${{ secrets.PASSWORD }}"

